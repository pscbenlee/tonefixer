<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tone Fixer</title>
  <style>
    body {font-family: Arial; padding: 30px; max-width: 600px; margin: auto;}
    input, select, button {width: 100%; padding: 10px; margin: 8px 0; font-size: 16px;}
    button {background: #4CAF50; color: white; border: none; cursor: pointer;}
    button:hover {background: #45a049;}
    #out {margin-top: 20px; white-space: pre-line; background: #f5f5f5; padding: 15px;}
  </style>
</head>
<body>
  <h2>Tool Đổi Tone Câu</h2>
  <input id="text" placeholder="Nhập câu cần đổi tone...">
  <select id="tone">
    <option value="lịch sự">Lịch sự</option>
    <option value="thân thiện">Thân thiện</option>
    <option value="hài hước">Hài hước</option>
    <option value="trang trọng">Trang trọng</option>
  </select>
  <button onclick="fix()">Tạo 3 phiên bản</button>
  <div id="out"></div>

  <script>
  async function fix() {
    const text = document.getElementById('text').value;
    const tone = document.getElementById('tone').value;
    const out = document.getElementById('out');
    
    if (!text) {
      out.innerText = 'Nhập câu trước đã ku ơi';
      return;
    }
    
    out.innerText = 'Đang xử lý...';
    
    try {
      const res = await fetch('/api/fix.mjs', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text, tone})
      });
      
      const data = await res.json();
      
      if (data.error) {
        out.innerText = 'Lỗi: ' + data.error;
      } else {
        out.innerText = data.results.join('\n\n');
      }
    } catch(e) {
      out.innerText = 'Lỗi mạng: ' + e.message;
    }
  }
  </script>
</body>
</html>
